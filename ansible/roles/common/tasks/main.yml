---
- name: Update apt package cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Upgrade all packages
  apt:
    upgrade: dist

- name: Install common packages
  apt:
    name:
      - curl
      - wget
      - git
      - ufw
      - ca-certificates
      - gnupg
      - lsb-release
      - htop
    state: present

- name: Configure UFW — allow SSH
  ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Configure UFW — allow HTTP
  ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Configure UFW — allow HTTPS
  ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Enable UFW
  ufw:
    state: enabled
    policy: deny
