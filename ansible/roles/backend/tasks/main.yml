---
- name: Pull backend Docker image
  docker_image:
    name: "{{ backend_image }}"
    source: pull
    force_source: yes

- name: Run backend container instances
  docker_container:
    name: "ticketing-backend-{{ item }}"
    image: "{{ backend_image }}"
    state: started
    restart_policy: unless-stopped
    ports:
      - "{{ backend_port + item - 1 }}:8080"
    env:
      APP_ENV: "production"
      PORT: "8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
  loop:
    - 1
    - 2

- name: Verify backend containers are running
  docker_container_info:
    name: "ticketing-backend-{{ item }}"
  register: results
  loop:
    - 1
    - 2

- name: Assert backend containers are healthy
  assert:
    that: item.container.State.Status == 'running'
    fail_msg: "Backend container is NOT running on {{ inventory_hostname }}!"
    success_msg: "Backend container is running on {{ inventory_hostname }}"
  loop: "{{ results.results }}"
