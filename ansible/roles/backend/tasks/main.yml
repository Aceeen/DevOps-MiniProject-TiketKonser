---
- name: Pull backend Docker image
  docker_image:
    name: "{{ backend_image }}"
    source: pull
    force_source: yes

- name: Run backend container
  docker_container:
    name: ticketing-backend
    image: "{{ backend_image }}"
    state: started
    restart_policy: unless-stopped
    ports:
      - "{{ backend_port }}:8080"
    env:
      APP_ENV: "production"
      PORT: "8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

- name: Verify backend container is running
  docker_container_info:
    name: ticketing-backend
  register: result

- name: Assert backend container is healthy
  assert:
    that: result.container.State.Status == 'running'
    fail_msg: "Backend container is NOT running on {{ inventory_hostname }}!"
    success_msg: "Backend container is running on {{ inventory_hostname }}"
