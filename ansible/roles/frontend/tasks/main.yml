---
- name: Pull frontend Docker image
  docker_image:
    name: "{{ frontend_image }}"
    source: pull
    force_source: yes

- name: Run frontend container instances
  docker_container:
    name: "ticketing-frontend-{{ item }}"
    image: "{{ frontend_image }}"
    state: started
    restart_policy: unless-stopped
    ports:
      - "{{ frontend_port + item - 1 }}:3000"
    env:
      APP_ENV: "production"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
  loop:
    - 1
    - 2

- name: Verify frontend containers are running
  docker_container_info:
    name: "ticketing-frontend-{{ item }}"
  register: results
  loop:
    - 1
    - 2

- name: Assert frontend containers are healthy
  assert:
    that: item.container.State.Status == 'running'
    fail_msg: "Frontend container is NOT running on {{ inventory_hostname }}!"
    success_msg: "Frontend container is running on {{ inventory_hostname }}"
  loop: "{{ results.results }}"
