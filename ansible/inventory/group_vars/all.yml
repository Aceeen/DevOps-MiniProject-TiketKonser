---
# Docker images — sesuaikan dengan DOCKERHUB_USERNAME kamu
frontend_image: "lushien/ticketing-frontend:1.0.0"
backend_image:  "lushien/ticketing-backend:1.0.0"

# Container ports
frontend_port: 3000
backend_port:  8080

# Docker registry
docker_registry: docker.io

# Nginx Load Balancer algorithm
# Gunakan 'least_conn' untuk Least Connections, atau hapus baris ini untuk Round Robin
lb_algorithm: least_conn

# Worker targets — digunakan oleh template nginx.conf.j2
# Karena kita pakai 3-VM architecture, kita spin up 2 kontainer di tiap VM pakai port berbeda
frontend_workers:
  - { name: wk01-c1, ip: 10.0.1.10, port: 3000 }
  - { name: wk01-c2, ip: 10.0.1.10, port: 3001 }

backend_workers:
  - { name: wk02-c1, ip: 10.0.1.11, port: 8080 }
  - { name: wk02-c2, ip: 10.0.1.11, port: 8081 }
