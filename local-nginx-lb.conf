# Konfigurasi Nginx untuk Simulasi Lokal (Mirroring Azure LB)
events {
    worker_connections 1024;
}

http {
    # Upstream definitions (menggunakan nama servis docker-compose)
    upstream frontend_srv {
        server frontend:3000;
    }

    upstream backend_srv {
        server backend:8080;
    }

    server {
        listen 80;

        # Route API requests ke backend
        location /api/ {
            proxy_pass http://backend_srv;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route default ke frontend
        location / {
            proxy_pass http://frontend_srv;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
