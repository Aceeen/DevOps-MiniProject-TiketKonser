version: '3.8'

services:
  # 1. API Backend (FastAPI)
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticketing-backend-local
    expose:
      - "8080"
    environment:
      - APP_ENV=production
    restart: always

  # 2. UI Frontend (Nginx Static)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ticketing-frontend-local
    expose:
      - "3000"
    restart: always
    depends_on:
      - backend

  # 3. Load Balancer (Mirroring Azure LB VM)
  lb:
    image: nginx:alpine
    container_name: ticketing-lb-local
    ports:
      - "80:80"
    volumes:
      - ./local-nginx-lb.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always

networks:
  default:
    name: ticketing-net
